name: create-ubuntu
run-name: create-ubuntu-${{ inputs.request_id }}

on:
  workflow_dispatch:
    inputs:
      request_id:
        required: true
        type: string
      duration_minutes:
        required: true
        type: string
      username:
        required: true
        type: string
      password:
        required: true
        type: string
      callback_url:
        required: true
        type: string
      callback_secret:
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 250
    steps:
      - uses: actions/checkout@v4
      - name: Notify provisioning
        shell: bash
        run: |
          curl -sS -X POST "${{ github.event.inputs.callback_url }}" \
            -H "content-type: application/json" \
            -H "x-hook-signature: ${{ github.event.inputs.callback_secret }}" \
            -d '{"request_id":"${{ github.event.inputs.request_id }}","status":"running","phase":"provisioning"}'
      - name: Notify RustDesk starting
        shell: bash
        run: |
          curl -sS -X POST "${{ github.event.inputs.callback_url }}" \
            -H "content-type: application/json" \
            -H "x-hook-signature: ${{ github.event.inputs.callback_secret }}" \
            -d '{"request_id":"${{ github.event.inputs.request_id }}","status":"running","phase":"rustdesk_starting"}'
      - name: Hold session
        shell: bash
        run: sleep "$((${{ github.event.inputs.duration_minutes }}*60))"
